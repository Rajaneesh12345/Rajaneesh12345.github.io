<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Account — Explainly</title>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>
<body>

<nav class="app-nav">
  <a href="/" class="nav-logo"><span>Explain</span>ly</a>
  <span class="nav-title">Account</span>
  <div style="width:34px;"></div>
</nav>

<main class="app-main">

  <!-- Profile card -->
  <div class="profile-card" id="profile-card">
    <div class="profile-avatar" id="acc-avatar">?</div>
    <div class="profile-info">
      <div class="profile-email" id="acc-email">Loading…</div>
      <span class="tier-badge tier-free" id="acc-tier">Free</span>
    </div>
  </div>

  <!-- Usage section -->
  <div class="card" style="padding:1.25rem;margin-bottom:1rem;" id="usage-card">
    <div class="usage-section">
      <h3>Today's Usage</h3>
      <div class="usage-bar-wrap" id="bar-daily" data-label="General"></div>
      <div class="usage-bar-wrap" id="bar-deep"  data-label="Deep"></div>
      <div class="usage-bar-wrap" id="bar-why"   data-label="Why?"></div>
      <p class="usage-reset" id="usage-reset">Resets daily at midnight</p>
    </div>
  </div>

  <!-- Features -->
  <div class="feature-grid" id="features-card">
    <h3>Your Plan Includes</h3>
    <div id="features-list">
      <div class="feature-row">
        <svg class="feature-check" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z" clip-rule="evenodd"/></svg>
        <span>AI Explanations (ELI5, Normal, Deep, Why?)</span>
      </div>
    </div>
  </div>

  <!-- Upgrade CTA -->
  <a id="upgrade-btn" href="/app/upgrade.html" class="btn btn-primary btn-full" style="display:none;margin-bottom:1rem;">
    Upgrade Plan
  </a>

  <!-- Sign out -->
  <div class="card" style="padding:1rem 1.25rem;">
    <button onclick="signOut()" style="display:flex;align-items:center;gap:.6rem;font-size:.9rem;font-weight:600;color:#6b7280;width:100%;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sign out
    </button>
  </div>

  <div style="height:.5rem;"></div>

  <div style="text-align:center;font-size:.78rem;color:#9ca3af;padding:.5rem 0;">
    <a href="/privacy.html" style="color:#9ca3af;">Privacy</a> &middot;
    <a href="/terms.html" style="color:#9ca3af;">Terms</a> &middot;
    <a href="/refund.html" style="color:#9ca3af;">Refund Policy</a>
  </div>

</main>

<nav class="tab-bar">
  <a href="/app/library.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    <span>Library</span>
  </a>
  <a href="/app/account.html" class="tab-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Account</span>
  </a>
  <a href="/app/upgrade.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Upgrade</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
  if (!requireAuth()) throw new Error('redirect');

  // Populate email + avatar immediately from localStorage
  var email = getEmail();
  if (email) {
    document.getElementById('acc-email').textContent = email;
    document.getElementById('acc-avatar').textContent = email[0].toUpperCase();
  }

  fetchUsage().then(function(data) {
    var tier   = (data.tier || 'free').toLowerCase();
    var limits = TIER_LIMITS[tier] || TIER_LIMITS.free;

    // Tier badge
    var tb = document.getElementById('acc-tier');
    tb.textContent = tier.charAt(0).toUpperCase() + tier.slice(1);
    tb.className   = 'tier-badge tier-' + tier;

    // Usage bars
    renderBar('bar-daily', 'General', data.usage_today || 0, limits.daily);
    renderBar('bar-deep',  'Deep',    data.usage_deep_today || 0, limits.deep);
    renderBar('bar-why',   'Why?',    data.usage_why_today  || 0, limits.why);

    // Upgrade button
    if (tier !== 'premium') document.getElementById('upgrade-btn').style.display = 'flex';

    // Features list
    renderFeatures(tier);
  }).catch(function() {
    document.getElementById('usage-card').innerHTML = '<p style="padding:1rem;color:#9ca3af;font-size:.875rem;">Could not load usage. Check your connection.</p>';
  });

  function renderBar(id, label, used, limit) {
    var pct   = limit > 0 ? Math.min(100, Math.round((used / limit) * 100)) : 0;
    var color = pct >= 90 ? 'bar-red' : pct >= 70 ? 'bar-orange' : 'bar-green';
    document.getElementById(id).innerHTML =
      '<div class="usage-bar-label"><span>' + label + '</span><span>' + used + ' / ' + limit + '</span></div>' +
      '<div class="usage-track"><div class="usage-fill ' + color + '" style="width:' + pct + '%"></div></div>';
  }

  function renderFeatures(tier) {
    var features = [
      { label: 'AI Explanations (ELI5, Normal, Deep, Why?)', minTier: 'free' },
      { label: 'Local saves (up to 50)',                     minTier: 'free' },
      { label: 'PDF Viewer',                                 minTier: 'pro'  },
      { label: 'Cloud saves (unlimited)',                    minTier: 'pro'  },
      { label: 'Priority queue',                             minTier: 'premium' },
      { label: 'Premium AI models',                          minTier: 'premium' },
    ];
    var html = features.map(function(f) {
      var unlocked = TIER_ORDER[tier] >= TIER_ORDER[f.minTier];
      return '<div class="feature-row">' +
        '<svg class="feature-check' + (unlocked ? '' : ' locked') + '" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">' +
        '<path fill-rule="evenodd" d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z" clip-rule="evenodd"/></svg>' +
        '<span>' + f.label + '</span>' +
        (unlocked ? '' : '<span class="feature-locked-label">' + f.minTier.charAt(0).toUpperCase() + f.minTier.slice(1) + '+</span>') +
        '</div>';
    }).join('');
    document.getElementById('features-list').innerHTML = html;
  }
</script>
</body>
</html>
