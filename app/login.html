<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sign In — Explainly</title>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-text"><span class="logo-accent">Explain</span>ly</div>
    </div>
    <h1 class="login-title">Sign in to your account</h1>
    <p class="login-sub">Access your saved explanations, manage your plan, and upgrade from any device.</p>

    <button id="google-btn" class="btn-google" onclick="handleSignIn()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div id="login-error" style="display:none; margin-top:.875rem; padding:.65rem .875rem; background:#fef2f2; border-radius:8px; font-size:.82rem; color:#b91c1c;"></div>

    <div class="login-divider"></div>

    <p class="login-footer">
      New to Explainly? <a href="https://chromewebstore.google.com/search/explainly" target="_blank" rel="noopener">Get the extension</a><br />
      <a href="/pricing.html">View pricing</a> &middot; <a href="/">Home</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (getToken()) window.location.replace('/app/library.html');

    var urlParams = new URLSearchParams(window.location.search);
    var errorMsg  = urlParams.get('error');
    if (errorMsg) {
      var el = document.getElementById('login-error');
      el.textContent = decodeURIComponent(errorMsg);
      el.style.display = 'block';
    }

    function handleSignIn() {
      var btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.textContent = 'Redirecting…';
      signInWithGoogle();
    }
  </script>
</body>
</html>
