<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Library — Explainly</title>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>
<body>

<nav class="app-nav">
  <a href="/" class="nav-logo"><span>Explain</span>ly</a>
  <span class="nav-title">Library</span>
  <a href="/app/account.html" class="nav-avatar" id="nav-avatar">?</a>
</nav>

<main class="app-main">

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="search-input" class="search-input" type="search" placeholder="Search saves…" autocomplete="off" />
    <button id="search-clear" class="search-clear" onclick="clearSearch()" aria-label="Clear search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Filter chips -->
  <div class="filter-chips" id="filter-chips">
    <button class="chip active" data-mode="all"    onclick="setFilter(this)">All</button>
    <button class="chip"        data-mode="eli5"   onclick="setFilter(this)">ELI5</button>
    <button class="chip"        data-mode="normal" onclick="setFilter(this)">Normal</button>
    <button class="chip"        data-mode="deep"   onclick="setFilter(this)">Deep</button>
    <button class="chip"        data-mode="why"    onclick="setFilter(this)">Why?</button>
  </div>

  <!-- List -->
  <div id="saves-list"></div>

  <!-- Load more -->
  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="btn btn-outline" onclick="loadMore()" id="load-more-btn">Load more</button>
  </div>

</main>

<nav class="tab-bar">
  <a href="/app/library.html" class="tab-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    <span>Library</span>
  </a>
  <a href="/app/account.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Account</span>
  </a>
  <a href="/app/upgrade.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Upgrade</span>
  </a>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
  if (!requireAuth()) throw new Error('redirect');

  // Set avatar initial
  document.getElementById('nav-avatar').textContent = getAvatarInitial();

  var _saves     = [];
  var _filter    = 'all';
  var _search    = '';
  var _offset    = 0;
  var _limit     = 30;
  var _hasMore   = false;
  var _debounce  = null;
  var _expanded  = {};

  // ── Boot ──────────────────────────────────────────────
  showSkeletons();
  loadSaves(0);

  document.getElementById('search-input').addEventListener('input', function() {
    var val = this.value;
    document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
    clearTimeout(_debounce);
    _debounce = setTimeout(function() {
      _search = val.trim().toLowerCase();
      render();
    }, 300);
  });

  // ── Data ──────────────────────────────────────────────
  function loadSaves(offset) {
    fetchSaves(offset, _limit + 1)
      .then(function(data) {
        if (!Array.isArray(data)) data = [];
        _hasMore = data.length > _limit;
        var batch = data.slice(0, _limit);
        if (offset === 0) {
          _saves  = batch;
          _offset = _limit;
        } else {
          _saves  = _saves.concat(batch);
          _offset = _saves.length;
        }
        render();
      })
      .catch(function() {
        showError();
      });
  }

  function loadMore() {
    document.getElementById('load-more-btn').disabled = true;
    loadSaves(_offset);
  }

  // ── Filter & search ────────────────────────────────────
  function getFiltered() {
    return _saves.filter(function(s) {
      var matchMode = _filter === 'all' || s.mode === _filter;
      var matchSearch = !_search ||
        (s.selected_text || '').toLowerCase().indexOf(_search) !== -1 ||
        (s.source_title  || '').toLowerCase().indexOf(_search) !== -1 ||
        (s.source_domain || '').toLowerCase().indexOf(_search) !== -1;
      return matchMode && matchSearch;
    });
  }

  function setFilter(btn) {
    document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
    btn.classList.add('active');
    _filter = btn.dataset.mode;
    render();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    _search = '';
    render();
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    var filtered = getFiltered();
    var list     = document.getElementById('saves-list');

    if (filtered.length === 0) {
      list.innerHTML = _saves.length === 0 ? emptyStateHTML() : noResultsHTML();
      document.getElementById('load-more-wrap').style.display = 'none';
      return;
    }

    list.innerHTML = filtered.map(cardHTML).join('');
    document.getElementById('load-more-wrap').style.display = _hasMore ? 'block' : 'none';
    document.getElementById('load-more-btn').disabled = false;

    // Restore expanded state
    Object.keys(_expanded).forEach(function(id) {
      var body = document.getElementById('body-' + id);
      var card = document.querySelector('[data-id="' + id + '"]');
      if (body && _expanded[id]) {
        body.style.display = 'block';
        if (card) card.classList.add('expanded');
      }
    });
  }

  var MODE_LABELS = { eli5: 'ELI5', normal: 'Normal', deep: 'Deep', why: 'Why?' };

  function cardHTML(s) {
    var title = s.source_title || truncate(s.selected_text || '', 70);
    var sub   = (s.source_domain ? esc(s.source_domain) + ' · ' : '') + relDate(s.created_at);
    var mode  = s.mode || 'normal';

    return '<div class="save-card" data-id="' + esc(s.id) + '">' +
      '<div class="save-card-header" onclick="toggleCard(\'' + esc(s.id) + '\')">' +
        '<span class="mode-badge mode-' + mode + '">' + (MODE_LABELS[mode] || mode) + '</span>' +
        '<div class="save-card-meta">' +
          '<div class="save-card-title">' + esc(title) + '</div>' +
          '<div class="save-card-sub">' + sub + '</div>' +
        '</div>' +
        '<button class="save-delete-btn" onclick="handleDelete(event,\'' + esc(s.id) + '\')" aria-label="Delete">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
        '</button>' +
        '<svg class="save-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</div>' +
      '<div class="save-card-body" id="body-' + esc(s.id) + '" style="display:none;">' +
        (s.selected_text ? '<div class="save-selected">' + esc(s.selected_text) + '</div>' : '') +
        sectionHTML('Meaning', s.meaning) +
        sectionHTML('Simpler', s.simpler) +
        sectionHTML('Tone',    s.tone)    +
        (s.source_url ? '<a class="save-source" href="' + s.source_url + '" target="_blank" rel="noopener">View source &rarr;</a>' : '') +
      '</div>' +
    '</div>';
  }

  function sectionHTML(label, text) {
    if (!text) return '';
    return '<div class="save-section"><strong>' + label + '</strong><p>' + esc(text) + '</p></div>';
  }

  // ── Toggle expand ──────────────────────────────────────
  function toggleCard(id) {
    var body = document.getElementById('body-' + id);
    var card = document.querySelector('[data-id="' + id + '"]');
    if (!body) return;
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    if (card) card.classList.toggle('expanded', !open);
    _expanded[id] = !open;
  }

  // ── Delete ─────────────────────────────────────────────
  function handleDelete(e, id) {
    e.stopPropagation();
    var card = document.querySelector('[data-id="' + id + '"]');
    if (!card) return;
    card.style.opacity = '.4';
    deleteSave(id)
      .then(function() {
        _saves = _saves.filter(function(s) { return s.id !== id; });
        delete _expanded[id];
        render();
        showToast('Deleted');
      })
      .catch(function() {
        card.style.opacity = '1';
        showToast('Could not delete — try again');
      });
  }

  // ── States ─────────────────────────────────────────────
  function showSkeletons() {
    var html = '';
    for (var i = 0; i < 3; i++) {
      html += '<div class="skeleton-card">' +
        '<div class="skeleton skeleton-badge"></div>' +
        '<div class="skeleton-lines">' +
          '<div class="skeleton skeleton-line"></div>' +
          '<div class="skeleton skeleton-line short"></div>' +
        '</div></div>';
    }
    document.getElementById('saves-list').innerHTML = html;
  }

  function emptyStateHTML() {
    return '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>' +
      '<h3>No saves yet</h3>' +
      '<p>Highlight text in the Explainly extension, tap Save, and it will appear here.</p>' +
    '</div>';
  }

  function noResultsHTML() {
    return '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>' +
      '<h3>No results</h3>' +
      '<p>Try a different search term or filter.</p>' +
    '</div>';
  }

  function showError() {
    document.getElementById('saves-list').innerHTML =
      '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '<h3>Could not load saves</h3>' +
        '<p>Check your connection and <a href="" onclick="location.reload();return false;">try again</a>.</p>' +
      '</div>';
  }

  // ── Toast ──────────────────────────────────────────────
  var _toastTimer;
  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  // ── Helpers ────────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function truncate(str, n) {
    return str.length <= n ? str : str.slice(0, n) + '…';
  }

  function relDate(iso) {
    if (!iso) return '';
    var diff = Date.now() - new Date(iso).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1)   return 'just now';
    if (mins < 60)  return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24)   return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    if (days < 30)  return days + 'd ago';
    var months = Math.floor(days / 30);
    if (months < 12) return months + 'mo ago';
    return Math.floor(months / 12) + 'yr ago';
  }
</script>
</body>
</html>
